<head>
<meta charset="UTF-8">

<title>Masuk — Auto EDA Insight</title>
<link rel="stylesheet" href="/static/css/theme.css">
<script>try{var t=localStorage.getItem('eda-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(_){}</script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #0EA5E9;
    --primary-dark: #0369A1;
    --primary-light: #E0F2FE;
    --bg: #F8FAFC;
    --surface: #FFFFFF;
    --border: #CBD5E1;
    --text: #0F172A;
    --text-muted: #475569;
    --text-light: #94A3B8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    overflow: hidden;
    position: relative;
  }

  /* ===== ANIMATED BACKGROUND ===== */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 90% 60% at 50% 0%, rgba(14,165,233,0.30) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 85% 20%, rgba(6,182,212,0.22) 0%, transparent 55%),
      radial-gradient(ellipse 55% 45% at 10% 65%, rgba(99,102,241,0.16) 0%, transparent 55%),
      linear-gradient(180deg, #A8D8F8 0%, #C8EAFF 30%, #DFF3FF 60%, #EDF8FF 100%);
    pointer-events: none;
  }

  /* Grid dots overlay */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(14,165,233,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(14,165,233,0.07) 1px, transparent 1px);
    background-size: 56px 56px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 80%);
    pointer-events: none;
  }

  /* Aurora orbs */
  .aurora-orb {
    position: fixed; border-radius: 50%;
    filter: blur(70px);
    pointer-events: none;
    animation: orbFloat 9s ease-in-out infinite;
  }
  .orb1 { width: 420px; height: 420px; background: radial-gradient(circle, rgba(14,165,233,0.45), transparent 70%); top: -120px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 360px; height: 360px; background: radial-gradient(circle, rgba(6,182,212,0.38), transparent 70%); top: -60px; right: -80px; animation-delay: -3.5s; }
  .orb3 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(99,102,241,0.28), transparent 70%); bottom: 60px; left: 5%; animation-delay: -6s; }
  .orb4 { width: 260px; height: 260px; background: radial-gradient(circle, rgba(236,72,153,0.18), transparent 70%); bottom: 100px; right: 8%; animation-delay: -2s; }
  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(28px, -18px) scale(1.06); }
    66% { transform: translate(-18px, 14px) scale(0.94); }
  }

  /* Floating particles */
  .particle {
    position: fixed; border-radius: 50%;
    pointer-events: none;
    animation: particleFloat linear infinite;
  }
  @keyframes particleFloat {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    8% { opacity: 1; }
    92% { opacity: 1; }
    100% { transform: translateY(-80px) rotate(720deg); opacity: 0; }
  }

  /* ===== CARD ===== */
  .card {
    position: relative; z-index: 1;
    background: rgba(255, 255, 255, 0.88);
    border: 1px solid rgba(14,165,233,0.2);
    border-radius: 24px;
    padding: 44px 40px;
    max-width: 420px; width: 100%;
    box-shadow:
      0 12px 40px rgba(14,165,233,0.15),
      0 0 0 1px rgba(255,255,255,0.6) inset;
    backdrop-filter: blur(20px);
    animation: fadeUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px) scale(0.97); }
    to { opacity: 1; transform: none; }
  }

  /* Subtle shine on card top */
  .card::before {
    content: '';
    position: absolute; top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(14,165,233,0.5), rgba(99,102,241,0.4), transparent);
    border-radius: 100%;
  }

  /* ===== LOGO ===== */
  .logo {
    display: flex; align-items: center; gap: 12px;
    justify-content: center;
    margin-bottom: 32px;
    text-decoration: none;
  }
  .logo-icon {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(14,165,233,0.4), 0 0 0 3px rgba(14,165,233,0.1);
    animation: logoPulse 3s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%, 100% { box-shadow: 0 4px 16px rgba(14,165,233,0.4), 0 0 0 3px rgba(14,165,233,0.1); }
    50% { box-shadow: 0 4px 20px rgba(14,165,233,0.55), 0 0 0 6px rgba(14,165,233,0.08); }
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 1.25rem; font-weight: 800;
    color: var(--primary-dark);
  }

  /* ===== CARD HEADER ===== */
  .card-header { text-align: center; margin-bottom: 28px; }
  .card-header h1 { font-size: 1.55rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .card-header p { font-size: 0.875rem; color: var(--text-muted); }

  /* ===== FORM ===== */
  .form-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 0.825rem; font-weight: 600;
    color: var(--text);
    margin-bottom: 7px;
  }

  .input-wrap { position: relative; }

  input {
    width: 100%;
    background: rgba(248,250,252,0.8);
    border: 1.5px solid rgba(203,213,225,0.8);
    border-radius: 11px;
    padding: 12px 42px 12px 16px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9375rem;
    transition: all 0.25s ease;
    outline: none;
    backdrop-filter: blur(4px);
  }
  input::placeholder { color: var(--text-light); }
  input:focus {
    border-color: var(--primary);
    background: rgba(255,255,255,0.95);
    box-shadow: 0 0 0 3px rgba(14,165,233,0.12), 0 2px 8px rgba(14,165,233,0.1);
  }
  input.shake { animation: shake 0.35s ease; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .eye-btn {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-light);
    font-size: 1rem; padding: 2px;
    transition: color 0.2s;
  }
  .eye-btn:hover { color: var(--primary); }

  /* ===== ERROR BOX ===== */
  .error-box {
    background: rgba(254,242,242,0.9);
    border: 1px solid #FECACA;
    border-radius: 11px;
    padding: 11px 14px;
    color: #EF4444;
    font-size: 0.85rem;
    margin-bottom: 18px;
    display: none; gap: 8px; align-items: center;
    backdrop-filter: blur(4px);
  }
  .error-box.show { display: flex; animation: fadeUp 0.2s ease both; }

  /* ===== BUTTON ===== */
  .btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none;
    border-radius: 11px;
    color: white;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 0.975rem;
    cursor: pointer;
    transition: all 0.25s ease;
    margin-top: 4px;
    box-shadow: 0 6px 20px rgba(14,165,233,0.4);
    position: relative; overflow: hidden;
    animation: btnGlow 3s ease-in-out infinite;
  }
  @keyframes btnGlow {
    0%, 100% { box-shadow: 0 6px 20px rgba(14,165,233,0.4); }
    50% { box-shadow: 0 6px 24px rgba(14,165,233,0.6), 0 0 16px rgba(14,165,233,0.15); }
  }
  /* Shine sweep on hover */
  .btn::before {
    content: '';
    position: absolute; top: 0; left: -70%;
    width: 40%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transform: skewX(-20deg);
    transition: left 0.45s ease;
  }
  .btn:hover::before { left: 120%; }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(14,165,233,0.55);
  }
  .btn:disabled {
    opacity: 0.55; cursor: not-allowed;
    transform: none;
    animation: none;
    box-shadow: 0 4px 12px rgba(14,165,233,0.2);
  }

  /* ===== DIVIDER ===== */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
  }
  .divider span { color: var(--text-light); font-size: 0.8rem; white-space: nowrap; }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: rgba(203,213,225,0.7);
  }

  /* ===== LINKS ===== */
  .link-row { text-align: center; font-size: 0.875rem; color: var(--text-muted); }
  .link { color: var(--primary); text-decoration: none; font-weight: 600; }
  .link:hover { text-decoration: underline; }

  .back {
    display: block; text-align: center;
    margin-top: 18px;
    color: var(--text-muted); font-size: 0.82rem;
    text-decoration: none; font-weight: 500;
    transition: color 0.2s;
  }
  .back:hover { color: var(--primary); }

  /* ===== SPINNER ===== */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  [data-theme="light"] body { background: #EEF4FB; }
  [data-theme="light"] .card { background: #FFFFFF; border-color: rgba(2,132,199,0.2); }
  [data-theme="light"] .card-header h1 { color: #0F172A; }
  [data-theme="light"] .card-header p { color: #334155; }
  [data-theme="light"] .form-group label { color: #0F172A; }
  [data-theme="light"] .form-input { background: #fff; border-color: rgba(2,132,199,0.25); color: #0F172A; }
  [data-theme="light"] .form-input::placeholder { color: #94A3B8; }
  [data-theme="light"] .logo-text { color: #0F172A; }
  [data-theme="light"] .link-row { color: #334155; }
  [data-theme="light"] .form-hint, [data-theme="light"] .helper-text { color: #64748B; }
  /* ===== THEME TOGGLE POSITION ===== */
  #themeToggleBtn {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 9999;
  }

  /* ===== LIGHT MODE OVERRIDES ===== */
  [data-theme="light"] .bg-layer {
    background:
      radial-gradient(ellipse 90% 60% at 50% 0%, rgba(14,165,233,0.18) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 85% 20%, rgba(6,182,212,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 55% 45% at 10% 65%, rgba(99,102,241,0.08) 0%, transparent 55%),
      linear-gradient(180deg, #DBEAFE 0%, #E0F2FE 30%, #F0F9FF 60%, #F8FAFC 100%);
  }
  [data-theme="light"] .orb1 { background: radial-gradient(circle, rgba(14,165,233,0.25), transparent 70%); }
  [data-theme="light"] .orb2 { background: radial-gradient(circle, rgba(6,182,212,0.20), transparent 70%); }
  [data-theme="light"] .orb3 { background: radial-gradient(circle, rgba(99,102,241,0.14), transparent 70%); }
  [data-theme="light"] .orb4 { background: radial-gradient(circle, rgba(236,72,153,0.10), transparent 70%); }
  [data-theme="light"] .theme-toggle { border-color: rgba(2,132,199,0.3); background: rgba(2,132,199,0.08); color: #0284C7; }

</style>
</head>

<script>
  // Auth check
  fetch('/api/auth/me').then(r => r.json()).then(d => {
    if (d.logged_in) window.location.href = '/dashboard';
  }).catch(() => {});

  // Floating particles
  const container = document.getElementById('particles');
  const colors = ['rgba(14,165,233,0.5)','rgba(6,182,212,0.4)','rgba(99,102,241,0.35)','rgba(245,158,11,0.3)','rgba(255,255,255,0.55)'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 5 + 3;
    const color = colors[Math.floor(Math.random() * colors.length)];
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${color};
      left:${Math.random() * 100}%;
      animation-duration:${Math.random() * 12 + 8}s;
      animation-delay:-${Math.random() * 12}s;
      box-shadow: 0 0 ${size * 2}px ${color};
    `;
    container.appendChild(p);
  }

  function onKey(e) { if (e.key === 'Enter') doLogin(); }

  function togglePw() {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  }

  function showError(msg) {
    const box = document.getElementById('errBox');
    document.getElementById('errText').textContent = msg;
    box.classList.add('show');
    ['username', 'password'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.add('shake');
      setTimeout(() => el.classList.remove('shake'), 400);
    });
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btnLogin');

    document.getElementById('errBox').classList.remove('show');

    if (!username) { showError('Username tidak boleh kosong.'); return; }
    if (!password) { showError('Password tidak boleh kosong.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Memproses...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        btn.innerHTML = '✓ Berhasil! Mengalihkan...';
        window.location.href = '/dashboard';
      } else {
        showError(data.error);
        btn.disabled = false;
        btn.innerHTML = 'Masuk';
      }
    } catch (e) {
      showError('Koneksi gagal, coba lagi.');
      btn.disabled = false;
      btn.innerHTML = 'Masuk';
    }
  }
</script>
<script src="/static/js/theme.js"></script>
</body>
</html>
